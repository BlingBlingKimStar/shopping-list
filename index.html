<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f7fafc;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      padding: 0;
    }

    .check-btn:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    li.checked .check-btn {
      background: #48bb78;
      border-color: #48bb78;
    }

    .check-btn::after {
      content: '';
      display: none;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    li.checked .check-btn::after {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .delete-btn:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px solid #fed7d7;
      color: #fc8181;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off">
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty">아직 아이템이 없습니다.</div>

    <button class="clear-btn" id="clearBtn" style="display:none">
      완료 항목 삭제
    </button>
  </div>

  <script>
    const STORAGE_KEY = 'shopping-items';

    const itemInput = document.querySelector('#itemInput');
    const addBtn    = document.querySelector('#addBtn');
    const listEl    = document.querySelector('#list');
    const emptyEl   = document.querySelector('#empty');
    const clearBtn  = document.querySelector('#clearBtn');
    const statsEl   = document.querySelector('#stats');

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(text));
      return d.innerHTML;
    }

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        emptyEl.style.display = 'block';
        statsEl.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';

      const checkedCount = items.filter(i => i.checked).length;
      statsEl.innerHTML = `총 <span>${items.length}</span>개 중 <span>${checkedCount}</span>개 완료`;
      clearBtn.style.display = checkedCount > 0 ? 'block' : 'none';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkBtn = document.createElement('button');
        checkBtn.className = 'check-btn';
        checkBtn.setAttribute('aria-label', item.checked ? '완료 취소' : '완료 표시');
        checkBtn.addEventListener('click', () => toggleCheck(idx));

        const textSpan = document.createElement('span');
        textSpan.className = 'item-text';
        textSpan.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.title = '삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deleteItem(idx));

        li.append(checkBtn, textSpan, delBtn);
        listEl.appendChild(li);
      });
    }

    function addItem() {
      const text = itemInput.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      itemInput.value = '';
      save();
      render();
      itemInput.focus();
    }

    function toggleCheck(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    clearBtn.addEventListener('click', clearChecked);
    itemInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
