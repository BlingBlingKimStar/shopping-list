<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f7fafc;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      padding: 0;
    }

    .check-btn:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    li.checked .check-btn {
      background: #48bb78;
      border-color: #48bb78;
    }

    .check-btn::after {
      content: '';
      display: none;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    li.checked .check-btn::after {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .delete-btn:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
      display: none;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .error-msg {
      text-align: center;
      color: #fc8181;
      font-size: 0.85rem;
      padding: 8px 0;
      display: none;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px solid #fed7d7;
      color: #fc8181;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off">
      <button id="addBtn">추가</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="loading" id="loading">불러오는 중...</div>
    <div class="empty" id="empty">아직 아이템이 없습니다.</div>

    <button class="clear-btn" id="clearBtn" style="display:none">
      완료 항목 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://rhsxxagzfltdnjvfnsxw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc3h4YWd6Zmx0ZG5qdmZuc3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjkxMjgsImV4cCI6MjA5MjgwNTEyOH0.SILr3DsKycy9gGlum6XcSIyeLRkNIL03YSixT0yXrlw';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const itemInput = document.querySelector('#itemInput');
    const addBtn    = document.querySelector('#addBtn');
    const listEl    = document.querySelector('#list');
    const emptyEl   = document.querySelector('#empty');
    const loadingEl = document.querySelector('#loading');
    const clearBtn  = document.querySelector('#clearBtn');
    const statsEl   = document.querySelector('#stats');
    const errorMsg  = document.querySelector('#errorMsg');

    let items = [];

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
    }

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        emptyEl.style.display = 'block';
        statsEl.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';

      const checkedCount = items.filter(i => i.checked).length;
      statsEl.innerHTML = `총 <span>${items.length}</span>개 중 <span>${checkedCount}</span>개 완료`;
      clearBtn.style.display = checkedCount > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkBtn = document.createElement('button');
        checkBtn.className = 'check-btn';
        checkBtn.setAttribute('aria-label', item.checked ? '완료 취소' : '완료 표시');
        checkBtn.addEventListener('click', () => toggleCheck(item.id));

        const textSpan = document.createElement('span');
        textSpan.className = 'item-text';
        textSpan.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.title = '삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deleteItem(item.id));

        li.append(checkBtn, textSpan, delBtn);
        listEl.appendChild(li);
      });
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at');

      loadingEl.style.display = 'none';

      if (error) {
        showError('데이터를 불러오지 못했습니다.');
        console.error(error);
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const text = itemInput.value.trim();
      if (!text) return;

      addBtn.disabled = true;
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      addBtn.disabled = false;

      if (error) {
        showError('아이템 추가에 실패했습니다.');
        console.error(error);
        return;
      }

      items.push(data);
      itemInput.value = '';
      render();
      itemInput.focus();
    }

    async function toggleCheck(id) {
      const item = items.find(i => i.id === id);
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        showError('상태 변경에 실패했습니다.');
        console.error(error);
        return;
      }

      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제에 실패했습니다.');
        console.error(error);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('checked', true);

      if (error) {
        showError('완료 항목 삭제에 실패했습니다.');
        console.error(error);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    addBtn.addEventListener('click', addItem);
    clearBtn.addEventListener('click', clearChecked);
    itemInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
